# Deploys the landing page in site/ to GitHub Pages — MANUAL ONLY.
#
# This repo's Pages cannot be enabled from here: collaborators have no Pages
# option in Settings, and the Actions token can't create the site (it gets
# "Resource not accessible by integration"). So the landing page is served from
# the app itself instead — https://thesis-production-bc39.up.railway.app/about
#
# If the repository OWNER wants a real github.io page too: Settings → Pages →
# Source → "GitHub Actions", then run this workflow manually (Actions tab → this
# workflow → "Run workflow"). It is workflow_dispatch-only so it never auto-fails
# on pushes while Pages is disabled.
name: Deploy site to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
