# Publishes the landing page in site/ to GitHub Pages.
# One-time setup: repo → Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". Only the site/ folder is uploaded, so nothing else
# in the repo (docs/, source, etc.) is exposed by Pages.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # enablement:true lets the workflow's own GITHUB_TOKEN (pages: write,
        # granted above) turn Pages ON via the API — so no repo-admin / Settings
        # access is needed. The first run both enables Pages and deploys.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
